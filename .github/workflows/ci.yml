name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Backend + Frontend Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: makasouk
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d makasouk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: makasouk
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      BROADCAST_CONNECTION: log
      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8000,localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, tokenizer, fileinfo, pdo_pgsql, pgsql, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare app env
        run: |
          cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Install JS dependencies
        run: npm ci

      - name: Migrate and seed database
        run: php artisan migrate:fresh --seed --force

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Laravel optimize clear
        run: php artisan optimize:clear

      - name: Backend tests
        run: php artisan test

      - name: Route smoke checks
        run: |
          set -euo pipefail
          php artisan serve --host=127.0.0.1 --port=8010 >/tmp/laravel-serve.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          sleep 2
          echo "Waiting for Laravel dev server on http://127.0.0.1:8010 ..."
          for attempt in {1..30}; do
            if curl -fsS "http://127.0.0.1:8010/" >/dev/null; then
              echo "Laravel dev server is reachable."
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "Route smoke check failed: Laravel dev server never became reachable."
              echo "---- /tmp/laravel-serve.log (tail -n 200) ----"
              tail -n 200 /tmp/laravel-serve.log || true
              exit 1
            fi

            echo "Server not ready yet (attempt ${attempt}/30), retrying..."
            sleep 1
          done

          routes=(
            "/"
            "/how-it-works"
            "/for-customers"
            "/for-tailors"
            "/faq"
            "/contact"
            "/app/login"
            "/admin-panel/login"
          )

          for route in "${routes[@]}"; do
            url="http://127.0.0.1:8010${route}"
            echo "Checking route: ${url}"

            if ! curl -fsS "${url}" >/dev/null; then
              echo "Route smoke check failed at: ${route}"
              echo "---- /tmp/laravel-serve.log (tail -n 200) ----"
              tail -n 200 /tmp/laravel-serve.log || true
              exit 1
            fi
          done

          echo "All route smoke checks passed."

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality-gates
    timeout-minutes: 45
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: makasouk
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d makasouk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8000
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: makasouk
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
      BROADCAST_CONNECTION: log
      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8000,localhost:8000
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, xml, ctype, json, tokenizer, fileinfo, pdo_pgsql, pgsql, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare app env
        run: |
          cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run e2e:ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
