name: CI

on:
  push:
    branches:
      - main
      - work
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    name: Backend + Frontend Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: makasouk
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d makasouk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8010

      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: makasouk
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      BROADCAST_CONNECTION: log

      REDIS_CLIENT: predis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: null

      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8010,localhost:8010

      REVERB_APP_ID: makasouk-app
      REVERB_APP_KEY: makasouk-key
      REVERB_APP_SECRET: makasouk-secret
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_ALLOWED_ORIGINS: 127.0.0.1:8010,localhost:8010

      SESSION_SECURE_COOKIE: false
      SESSION_SAME_SITE: lax
      LOG_CHANNEL: stack
      LOG_STACK: single

      LARAVEL_BYPASS_ENV_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, PDO, pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare app env
        run: |
          cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Install JS dependencies
        run: npm ci

      - name: Migrate and seed database
        run: php artisan migrate:fresh --seed

      - name: Frontend tests
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Laravel optimize clear
        run: php artisan optimize:clear

      - name: Backend tests
        run: php artisan test

      - name: Route smoke checks
        shell: bash
        run: |
          set -euo pipefail

          php artisan serve --host=127.0.0.1 --port=8010 >/tmp/laravel-serve.log 2>&1 &

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8010/ >/dev/null; then
              echo "Laravel server is ready."
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "Laravel server did not become ready in time."
              echo "===== /tmp/laravel-serve.log ====="
              tail -n 200 /tmp/laravel-serve.log || true
              exit 1
            fi

            sleep 1
          done

          routes=(
            "/"
            "/how-it-works"
            "/for-customers"
            "/for-tailors"
            "/faq"
            "/contact"
            "/app/login"
            "/admin-panel/login"
          )

          for route in "${routes[@]}"; do
            echo "Checking route: ${route}"
            if ! curl -fsS "http://127.0.0.1:8010${route}" >/dev/null; then
              echo "Route failed: ${route}"
              echo "===== /tmp/laravel-serve.log ====="
              tail -n 200 /tmp/laravel-serve.log || true
              exit 1
            fi
          done

  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality-gates

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: makasouk
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d makasouk"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1:8000

      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: makasouk
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
      BROADCAST_CONNECTION: log

      REDIS_CLIENT: predis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_PASSWORD: null

      SANCTUM_STATEFUL_DOMAINS: 127.0.0.1:8000,localhost:8000

      REVERB_APP_ID: makasouk-app
      REVERB_APP_KEY: makasouk-key
      REVERB_APP_SECRET: makasouk-secret
      REVERB_HOST: 127.0.0.1
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_SERVER_HOST: 0.0.0.0
      REVERB_SERVER_PORT: 8080
      REVERB_ALLOWED_ORIGINS: 127.0.0.1:8000,localhost:8000

      SESSION_SECURE_COOKIE: false
      SESSION_SAME_SITE: lax
      LOG_CHANNEL: stack
      LOG_STACK: single

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, PDO, pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Prepare app env
        run: |
          cp .env.example .env

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Generate app key
        run: php artisan key:generate

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare database
        run: php artisan migrate:fresh --seed

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Playwright E2E
        run: npm run e2e:ci